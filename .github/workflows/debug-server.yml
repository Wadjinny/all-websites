name: Debug server state (temporary)

on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${{ secrets.SSH_PORT || '22' }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Inspect server
        run: |
          ssh -i ~/.ssh/id_rsa -p "${{ secrets.SSH_PORT || '22' }}" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" bash -s <<'EOF'
          echo "== caddy sites =="
          ls -la /etc/caddy/sites/ 2>&1
          cat /etc/caddy/sites/* 2>&1
          echo "== all-websites refs in nginx =="
          grep -rn "all-web" /etc/nginx/ 2>/dev/null
          echo "== typo dir contents =="
          ls -la "${{ secrets.SSH_DEPLOY_DIR }}/all-webites/" 2>&1
          echo "== permissions =="
          id
          stat -c '%U %G %a %n' "${{ secrets.SSH_DEPLOY_DIR }}" "${{ secrets.SSH_DEPLOY_DIR }}/all-webites" "${{ secrets.SSH_DEPLOY_DIR }}/all-websites" /etc/caddy/sites/* 2>&1
          sudo -n true 2>&1 && echo "HAS passwordless sudo" || echo "NO passwordless sudo"
          EOF
