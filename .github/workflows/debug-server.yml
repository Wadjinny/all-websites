name: Debug server state (temporary)

on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${{ secrets.SSH_PORT || '22' }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Fix caddy root typo and reload
        run: |
          ssh -i ~/.ssh/id_rsa -p "${{ secrets.SSH_PORT || '22' }}" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" bash -s <<'EOF'
          set -e
          echo "== before =="
          cat /etc/caddy/sites/all-websites.conf
          sudo sed -i 's|/all-webites|/all-websites|' /etc/caddy/sites/all-websites.conf
          echo "== after =="
          cat /etc/caddy/sites/all-websites.conf
          echo "== validate =="
          caddy validate --config /etc/caddy/Caddyfile 2>&1 | tail -2
          sudo systemctl reload caddy
          sleep 2
          systemctl is-active caddy
          echo "== local check: served bundle now =="
          curl -sk -H 'Host: all-websites.w-ilyas.site' https://127.0.0.1/ --resolve all-websites.w-ilyas.site:443:127.0.0.1 2>&1 | grep -oE '/assets/[^"]*\.js' || curl -s http://127.0.0.1:2019/config/ >/dev/null && echo "(local curl inconclusive, will verify via public URL)"
          echo "== remove stale typo dir =="
          rm -rf "${{ secrets.SSH_DEPLOY_DIR }}/all-webites"
          ls "${{ secrets.SSH_DEPLOY_DIR }}/" | grep all-web
          EOF
